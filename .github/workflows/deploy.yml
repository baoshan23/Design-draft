name: Build and Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  BUILD_DIR: "website/frontend/out"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "website/frontend/package-lock.json"

      - name: Install dependencies
        working-directory: website/frontend
        run: npm ci --production=false

      - name: Build project
        working-directory: website/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.BUILD_DIR }}
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secrets configured
        run: |
          echo "Checking required deployment secrets..."
          if [[ -z "$SSH_KEY" ]] || [[ -z "$CI_HOST" ]] || [[ -z "$CI_USER" ]] || [[ -z "$CI_PATH" ]]; then
            echo "⚠️  Deployment secrets not fully configured"
            echo "To enable automatic deployment, add these secrets to:"
            echo "Settings → Secrets and variables → Actions"
            echo ""
            echo "Required secrets:"
            echo "  - SSH_KEY (private SSH key for server access)"
            echo "  - CI_HOST (server IP/hostname)"
            echo "  - CI_USER (SSH username)"
            echo "  - CI_PATH (deployment directory path)"
            echo ""
            echo "Skipping deployment. Manual deployment available via SFTP."
            exit 0
          fi
          echo "✅ All deployment secrets configured"
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          CI_HOST: ${{ secrets.CI_HOST }}
          CI_USER: ${{ secrets.CI_USER }}
          CI_PATH: ${{ secrets.CI_PATH }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.BUILD_DIR }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -T 10 ${{ secrets.CI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking=accept-new" >> ~/.ssh/config

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ${{ env.BUILD_DIR }}/ \
            ${{ secrets.CI_USER }}@${{ secrets.CI_HOST }}:${{ secrets.CI_PATH }}/

      - name: Cleanup SSH
        if: always()
        run: |
          rm -rf ~/.ssh

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 Site: ${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
