server {
    listen 80;
    server_name v3.gcss.hk;

    root /var/www/gcss-website;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Upload size (matches Go backend 10 MB limit) ────
    client_max_body_size 10m;

    # ── Proxy defaults ───────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── API → Go backend ────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;

        # Timeouts for long-running requests
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Uploaded files → Go backend ─────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;

        # Cache uploaded images in browser for 7 days
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Health check → Go backend ───────────────────────
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        access_log off;
    }

    # ── Static assets (CSS, JS, images, fonts) ──────────
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Frontend (Next.js static export with trailingSlash) ──
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html /index.html;
    }

    # ── Security headers ────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
